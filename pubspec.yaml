name: shiftat
description: "سوق العمل العربي - Shiftat Mobile Job Marketplace"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # UI & Fonts
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  smooth_page_indicator: ^1.1.0

  # State & Storage
  shared_preferences: ^2.3.2

  # OTP Input widget
  pin_code_fields: ^8.0.1

  # Backend & Env
  supabase_flutter: ^2.5.0
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
